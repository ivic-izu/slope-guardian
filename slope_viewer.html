<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SLOPE GUARDIAN – 3D斜面ビューア</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
  :root {
    --navy: #0d1b2a; --navy2: #1a2d42; --gray: #8a9bb0;
    --wine: #8b1a2f; --wine2: #c0253e; --white: #e8edf2; --accent: #4a9eca;
  }
  html, body {
    background: var(--navy); color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    height: 100%; width: 100%; overflow: hidden;
    touch-action: none; user-select: none;
  }
  body { display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; flex-shrink: 0; z-index: 10;
    background: linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
    border-bottom: 1px solid rgba(139,26,47,0.5);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; }
  .logo-text { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.3rem; letter-spacing: 0.1em; }
  .logo-text span { color: var(--wine2); }
  .site-name { font-size: 0.65rem; color: var(--gray); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }
  .header-right { text-align: right; font-size: 0.72rem; color: var(--gray); line-height: 1.6; }
  .header-right strong { color: var(--white); font-weight: 400; }
  #canvas-container { flex: 1; position: relative; overflow: hidden; touch-action: none; }
  canvas { display: block; width: 100% !important; height: 100% !important; touch-action: none; }
  #loading {
    position: absolute; inset: 0; background: var(--navy);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.5s; pointer-events: none;
  }
  #loading.hidden { opacity: 0; }
  .loading-bar-wrap { width: 240px; height: 3px; background: var(--navy2); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
  .loading-bar { height: 100%; background: linear-gradient(90deg, var(--wine), var(--accent)); border-radius: 2px; transition: width 0.3s; width: 0%; }
  .loading-text { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; color: var(--gray); letter-spacing: 0.1em; }
  #controls {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 20; pointer-events: auto; touch-action: auto;
    background: rgba(13,27,42,0.85); padding: 8px 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px);
  }
  .ctrl-btn {
    background: var(--navy2); border: 1px solid rgba(255,255,255,0.1);
    color: var(--white); padding: 6px 14px; border-radius: 5px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.72rem;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    touch-action: auto; pointer-events: auto;
  }
  .ctrl-btn:hover { background: var(--wine); border-color: var(--wine2); }
  #hint {
    position: absolute; top: 12px; right: 14px; font-size: 0.65rem;
    color: var(--gray); text-align: right; line-height: 1.8;
    background: rgba(13,27,42,0.7); padding: 8px 12px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.06); z-index: 20; pointer-events: none;
  }
  #error {
    position: absolute; inset: 0; background: var(--navy);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; gap: 16px; text-align: center; padding: 40px;
  }
  #error.show { display: flex; }
  #error h2 { color: var(--wine2); font-size: 1.1rem; }
  #error p { color: var(--gray); font-size: 0.82rem; line-height: 1.7; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
      <polygon points="16,2 30,28 2,28" fill="none" stroke="#8b1a2f" stroke-width="2"/>
      <polygon points="16,8 26,26 6,26" fill="rgba(139,26,47,0.15)" stroke="#c0253e" stroke-width="1"/>
      <circle cx="16" cy="16" r="2" fill="#4a9eca"/>
    </svg>
    <div>
      <div class="logo-text">SLOPE <span>GUARDIAN</span></div>
      <div class="site-name">3D Slope Viewer</div>
    </div>
  </div>
  <div class="header-right">
    <strong id="model-name">－</strong><br>
    調査日：<span id="survey-date">－</span><br>
    <span style="color:var(--wine2);font-size:0.65rem;">● LIVE MODEL</span>
  </div>
</header>

<div id="canvas-container">
  <div id="loading">
    <svg width="60" height="60" viewBox="0 0 60 60" fill="none" style="margin-bottom:20px">
      <polygon points="30,4 56,52 4,52" fill="none" stroke="#8b1a2f" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="3s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="30" cy="30" r="4" fill="#4a9eca">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-text" id="loading-text">3Dモデルを読み込み中...</div>
  </div>
  <div id="error">
    <h2>⚠ モデルの読み込みに失敗しました</h2>
    <p id="error-msg"></p>
  </div>
  <div id="hint">
    🖱 ドラッグ：回転<br>
    📱 1本指：回転<br>
    📱 2本指：ズーム
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-reset">🔄 リセット</button>
    <button class="ctrl-btn" id="btn-top">⬆ 上面</button>
    <button class="ctrl-btn" id="btn-front">⬛ 正面</button>
    <button class="ctrl-btn" id="btn-auto">▶ 自動回転</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const MODEL_FILE = 'kawazu_tunnel_20260415.glb';
const MODEL_DISPLAY_NAME = '河津浜トンネル歩道';
const SURVEY_DATE = '2026.04.15';

document.getElementById('model-name').textContent = MODEL_DISPLAY_NAME;
document.getElementById('survey-date').textContent = SURVEY_DATE;

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1b2a);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(5, 10, 5); scene.add(dir);
const fill = new THREE.DirectionalLight(0x88aacc, 0.3);
fill.position.set(-5, 3, -5); scene.add(fill);

// --- シンプルなOrbitControls ---
const state = { rotating: false, zooming: false, lastX: 0, lastY: 0, lastDist: 0 };
const target = new THREE.Vector3();
let phi = Math.PI / 3, theta = 0, radius = 30;
let autoRotate = false;
let model = null, initPhi, initTheta, initRadius;

function updateCamera() {
  camera.position.set(
    target.x + radius * Math.sin(phi) * Math.sin(theta),
    target.y + radius * Math.cos(phi),
    target.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(target);
}

// マウス
renderer.domElement.addEventListener('mousedown', e => {
  state.rotating = true;
  state.lastX = e.clientX; state.lastY = e.clientY;
});
window.addEventListener('mousemove', e => {
  if (!state.rotating) return;
  theta -= (e.clientX - state.lastX) * 0.01;
  phi = Math.max(0.05, Math.min(Math.PI - 0.05, phi - (e.clientY - state.lastY) * 0.01));
  state.lastX = e.clientX; state.lastY = e.clientY;
  updateCamera();
});
window.addEventListener('mouseup', () => { state.rotating = false; });
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  radius = Math.max(0.5, radius * (e.deltaY > 0 ? 1.1 : 0.9));
  updateCamera();
}, { passive: false });

// タッチ
renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    state.rotating = true;
    state.lastX = e.touches[0].clientX;
    state.lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    state.rotating = false;
    state.zooming = true;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    state.lastDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && state.rotating) {
    const dx = e.touches[0].clientX - state.lastX;
    const dy = e.touches[0].clientY - state.lastY;
    theta -= dx * 0.01;
    phi = Math.max(0.05, Math.min(Math.PI - 0.05, phi - dy * 0.01));
    state.lastX = e.touches[0].clientX;
    state.lastY = e.touches[0].clientY;
    updateCamera();
  } else if (e.touches.length === 2 && state.zooming) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    radius = Math.max(0.5, radius * (state.lastDist / dist));
    state.lastDist = dist;
    updateCamera();
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) { state.rotating = false; state.zooming = false; }
  else if (e.touches.length === 1) {
    state.zooming = false; state.rotating = true;
    state.lastX = e.touches[0].clientX;
    state.lastY = e.touches[0].clientY;
  }
}, { passive: false });

// ボタン
document.getElementById('btn-reset').addEventListener('click', () => {
  if (initPhi !== undefined) { phi = initPhi; theta = initTheta; radius = initRadius; updateCamera(); }
});
document.getElementById('btn-top').addEventListener('click', () => {
  phi = 0.1; updateCamera();
});
document.getElementById('btn-front').addEventListener('click', () => {
  phi = Math.PI / 2; theta = 0; updateCamera();
});
document.getElementById('btn-auto').addEventListener('click', () => {
  autoRotate = !autoRotate;
  document.getElementById('btn-auto').textContent = autoRotate ? '⏸ 停止' : '▶ 自動回転';
});

// リサイズ
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// アニメーション
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) { theta += 0.005; updateCamera(); }
  renderer.render(scene, camera);
}
animate();

// GLB読み込み
function loadGLB(url) {
  const bar = document.getElementById('loading-bar');
  const txt = document.getElementById('loading-text');
  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const total = parseInt(res.headers.get('content-length') || '0');
      let loaded = 0;
      const reader = res.body.getReader(), chunks = [];
      function read() {
        return reader.read().then(({ done, value }) => {
          if (done) return;
          chunks.push(value); loaded += value.length;
          if (total > 0) { bar.style.width = Math.round(loaded/total*80)+'%'; txt.textContent = `読み込み中... ${Math.round(loaded/1024/1024)}MB`; }
          return read();
        });
      }
      return read().then(() => new Blob(chunks).arrayBuffer());
    })
    .then(buf => {
      bar.style.width = '85%'; txt.textContent = 'Dracoデコード中...';
      return new Promise((res, rej) => {
        const s1 = document.createElement('script');
        s1.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
        s1.onload = () => {
          const s2 = document.createElement('script');
          s2.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js';
          s2.onload = () => {
            const loader = new THREE.GLTFLoader();
            const draco = new THREE.DRACOLoader();
            draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
            loader.setDRACOLoader(draco);
            loader.parse(buf, '', g => res(g.scene), rej);
          };
          s2.onerror = () => rej(new Error('DRACOLoader失敗'));
          document.head.appendChild(s2);
        };
        s1.onerror = () => rej(new Error('GLTFLoader失敗'));
        document.head.appendChild(s1);
      });
    })
    .then(obj => {
      bar.style.width = '100%'; txt.textContent = '完了！';
      scene.add(obj); model = obj;
      const box = new THREE.Box3().setFromObject(obj);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      obj.scale.setScalar(20 / maxDim);
      const box2 = new THREE.Box3().setFromObject(obj);
      target.copy(box2.getCenter(new THREE.Vector3()));
      radius = box2.getSize(new THREE.Vector3()).length() * 1.2;
      phi = Math.PI / 3; theta = Math.PI / 6;
      initPhi = phi; initTheta = theta; initRadius = radius;
      updateCamera();
      setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      const e = document.getElementById('error');
      e.classList.add('show');
      document.getElementById('error-msg').textContent = `ファイル "${MODEL_FILE}" の読み込みに失敗しました。\nエラー: ${err.message}`;
    });
}

loadGLB(MODEL_FILE);
</script>
</body>
</html>
