<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SLOPE GUARDIAN – 3D斜面ビューア</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a; --navy2: #1a2d42; --gray: #8a9bb0;
    --wine: #8b1a2f; --wine2: #c0253e; --white: #e8edf2; --accent: #4a9eca;
  }
  html, body {
    background: var(--navy); color: var(--white);
    font-family: sans-serif; height: 100%; width: 100%;
    overflow: hidden; touch-action: none; user-select: none;
  }
  body { display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; flex-shrink: 0;
    background: linear-gradient(90deg, var(--navy), var(--navy2));
    border-bottom: 1px solid rgba(139,26,47,0.5);
  }
  .logo-text { font-weight: 700; font-size: 1.1rem; letter-spacing: 0.1em; }
  .logo-text span { color: var(--wine2); }
  .header-right { text-align: right; font-size: 0.72rem; color: var(--gray); line-height: 1.6; }
  .header-right strong { color: var(--white); font-weight: 400; }
  #canvas-container { flex: 1; position: relative; overflow: hidden; }
  #canvas-container canvas { touch-action: none; }
  #loading {
    position: absolute; inset: 0; background: var(--navy);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loading-bar-wrap { width: 240px; height: 3px; background: var(--navy2); border-radius: 2px; overflow: hidden; margin: 16px 0 8px; }
  .loading-bar { height: 100%; background: linear-gradient(90deg, var(--wine), var(--accent)); width: 0%; transition: width 0.3s; }
  .loading-text { font-size: 0.85rem; color: var(--gray); }
  #controls {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 20;
    background: rgba(13,27,42,0.85); padding: 8px 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .ctrl-btn {
    background: var(--navy2); border: 1px solid rgba(255,255,255,0.1);
    color: var(--white); padding: 6px 14px; border-radius: 5px;
    font-size: 0.72rem; cursor: pointer; white-space: nowrap;
  }
  .ctrl-btn:hover, .ctrl-btn:active { background: var(--wine); }
  #hint {
    position: absolute; top: 12px; right: 14px; font-size: 0.65rem;
    color: var(--gray); text-align: right; line-height: 1.8;
    background: rgba(13,27,42,0.7); padding: 8px 12px; border-radius: 6px;
    pointer-events: none; z-index: 20;
  }
  #error {
    position: absolute; inset: 0; background: var(--navy);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; gap: 16px; text-align: center; padding: 40px;
  }
  #error.show { display: flex; }
  #error h2 { color: var(--wine2); }
  #error p { color: var(--gray); font-size: 0.85rem; line-height: 1.7; }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo-text">SLOPE <span>GUARDIAN</span></div>
    <div style="font-size:0.65rem;color:var(--gray);letter-spacing:0.1em;">3D SLOPE VIEWER</div>
  </div>
  <div class="header-right">
    <strong id="model-name">－</strong><br>
    調査日：<span id="survey-date">－</span><br>
    <span style="color:var(--wine2);font-size:0.65rem;">● LIVE MODEL</span>
  </div>
</header>

<div id="canvas-container">
  <div id="loading">
    <svg width="50" height="50" viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="20" fill="none" stroke="var(--wine)" stroke-width="3" stroke-dasharray="100 30">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-text" id="loading-text">読み込み中...</div>
  </div>
  <div id="error">
    <h2>⚠ 読み込みエラー</h2>
    <p id="error-msg"></p>
  </div>
  <div id="hint">📱 1本指：回転<br>📱 2本指：ズーム<br>🖱 ドラッグ：回転</div>
  <div id="controls">
    <button class="ctrl-btn" onclick="resetView()">🔄 リセット</button>
    <button class="ctrl-btn" onclick="topView()">⬆ 上面</button>
    <button class="ctrl-btn" onclick="frontView()">⬛ 正面</button>
    <button class="ctrl-btn" id="btn-auto" onclick="toggleAuto()">▶ 自動回転</button>
  </div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- 公式OrbitControls（タッチ対応済み） -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// --- 設定 ---
const MODEL_FILE = 'kawazu_tunnel_20260415.glb';
const MODEL_DISPLAY_NAME = '河津浜トンネル歩道';
const SURVEY_DATE = '2026.04.15';
// ------------

document.getElementById('model-name').textContent = MODEL_DISPLAY_NAME;
document.getElementById('survey-date').textContent = SURVEY_DATE;

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1b2a);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 1000);
camera.position.set(0, 10, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

// ライト
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(5, 10, 5);
scene.add(dir);

// 公式OrbitControls（PC・スマホ両対応）
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.screenSpacePanning = false;
controls.minDistance = 0.5;
controls.maxDistance = 500;

let model = null;
let autoRotating = false;
let initPos, initTarget;

function resetView() {
  if (initPos) { camera.position.copy(initPos); controls.target.copy(initTarget); controls.update(); }
}
function topView() {
  if (!model) return;
  const box = new THREE.Box3().setFromObject(model);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  camera.position.set(c.x, c.y + s.y * 2.5, c.z + 0.01);
  controls.target.copy(c); controls.update();
}
function frontView() {
  if (!model) return;
  const box = new THREE.Box3().setFromObject(model);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  camera.position.set(c.x, c.y, c.z + s.z * 2.2);
  controls.target.copy(c); controls.update();
}
function toggleAuto() {
  autoRotating = !autoRotating;
  controls.autoRotate = autoRotating;
  document.getElementById('btn-auto').textContent = autoRotating ? '⏸ 停止' : '▶ 自動回転';
}

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// GLB + Draco読み込み
const loader = new THREE.GLTFLoader();
const draco = new THREE.DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
loader.setDRACOLoader(draco);

const bar = document.getElementById('loading-bar');
const txt = document.getElementById('loading-text');

loader.load(
  MODEL_FILE,
  (gltf) => {
    const obj = gltf.scene;
    scene.add(obj);
    model = obj;
    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    obj.scale.setScalar(20 / maxDim);

    const box2 = new THREE.Box3().setFromObject(obj);
    const center2 = box2.getCenter(new THREE.Vector3());
    const size2 = box2.getSize(new THREE.Vector3());
    controls.target.copy(center2);
    camera.position.set(center2.x, center2.y + size2.y * 0.5, size2.z * 2.2);
    controls.update();

    initPos = camera.position.clone();
    initTarget = controls.target.clone();

    bar.style.width = '100%';
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
  },
  (xhr) => {
    if (xhr.total > 0) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      bar.style.width = pct + '%';
      txt.textContent = `読み込み中... ${pct}%`;
    }
  },
  (err) => {
    document.getElementById('loading').style.display = 'none';
    const e = document.getElementById('error');
    e.classList.add('show');
    document.getElementById('error-msg').textContent =
      `"${MODEL_FILE}" の読み込みに失敗しました。\nエラー: ${err.message}`;
  }
);
</script>
</body>
</html>
