<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOPE GUARDIAN – 3D斜面ビューア</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy2: #1a2d42;
    --gray: #8a9bb0;
    --wine: #8b1a2f;
    --wine2: #c0253e;
    --white: #e8edf2;
    --accent: #4a9eca;
  }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ヘッダー */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
    border-bottom: 1px solid rgba(139,26,47,0.5);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    color: var(--white);
  }

  .logo-text span {
    color: var(--wine2);
  }

  .site-name {
    font-size: 0.65rem;
    color: var(--gray);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right {
    text-align: right;
    font-size: 0.72rem;
    color: var(--gray);
    line-height: 1.6;
  }

  .header-right strong {
    color: var(--white);
    font-weight: 400;
  }

  /* キャンバスコンテナ */
  #canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* ローディング */
  #loading {
    position: absolute;
    inset: 0;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-icon {
    width: 60px;
    height: 60px;
    margin-bottom: 20px;
  }

  .loading-bar-wrap {
    width: 240px;
    height: 3px;
    background: var(--navy2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--wine), var(--accent));
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  .loading-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    color: var(--gray);
    letter-spacing: 0.1em;
  }

  /* コントロールパネル */
  #controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 20;
    background: rgba(13,27,42,0.85);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
  }

  .ctrl-btn {
    background: var(--navy2);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    padding: 6px 14px;
    border-radius: 5px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .ctrl-btn:hover {
    background: var(--wine);
    border-color: var(--wine2);
  }

  /* 操作ヒント */
  #hint {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 0.65rem;
    color: var(--gray);
    text-align: right;
    line-height: 1.8;
    background: rgba(13,27,42,0.7);
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.06);
    z-index: 20;
  }

  /* エラー表示 */
  #error {
    position: absolute;
    inset: 0;
    background: var(--navy);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 16px;
    text-align: center;
    padding: 40px;
  }

  #error.show { display: flex; }
  #error h2 { color: var(--wine2); font-size: 1.1rem; }
  #error p { color: var(--gray); font-size: 0.82rem; line-height: 1.7; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="16,2 30,28 2,28" fill="none" stroke="#8b1a2f" stroke-width="2"/>
      <polygon points="16,8 26,26 6,26" fill="rgba(139,26,47,0.15)" stroke="#c0253e" stroke-width="1"/>
      <circle cx="16" cy="16" r="2" fill="#4a9eca"/>
    </svg>
    <div>
      <div class="logo-text">SLOPE <span>GUARDIAN</span></div>
      <div class="site-name">3D Slope Viewer</div>
    </div>
  </div>
  <div class="header-right">
    <strong id="model-name">－</strong><br>
    調査日：<span id="survey-date">－</span><br>
    <span style="color:var(--wine2); font-size:0.65rem;">● LIVE MODEL</span>
  </div>
</header>

<div id="canvas-container">
  <!-- ローディング -->
  <div id="loading">
    <svg class="loading-icon" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="30,4 56,52 4,52" fill="none" stroke="#8b1a2f" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="3s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="30" cy="30" r="4" fill="#4a9eca">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
    <div class="loading-bar-wrap">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">3Dモデルを読み込み中...</div>
  </div>

  <!-- エラー -->
  <div id="error">
    <h2>⚠ モデルの読み込みに失敗しました</h2>
    <p id="error-msg">GLBファイルが見つかりません。<br>slope_viewer.html と同じフォルダにGLBファイルを配置してください。</p>
  </div>

  <!-- 操作ヒント -->
  <div id="hint">
    🖱 左ドラッグ：回転<br>
    🖱 右ドラッグ：移動<br>
    🖱 ホイール：ズーム<br>
    📱 指2本：ピンチズーム
  </div>

  <!-- コントロール -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-reset">🔄 リセット</button>
    <button class="ctrl-btn" id="btn-top">⬆ 上面</button>
    <button class="ctrl-btn" id="btn-front">⬛ 正面</button>
    <button class="ctrl-btn" id="btn-auto" id="btn-auto">▶ 自動回転</button>
  </div>
</div>

<!-- Three.js + Draco -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- GLBファイル名設定（ここを差し替えるだけでOK）---
const MODEL_FILE = 'kawazu_tunnel_20260415.glb';
const MODEL_DISPLAY_NAME = '河津浜トンネル歩道';
const SURVEY_DATE = '2026.04.15';
// -------------------------------------------------------

document.getElementById('model-name').textContent = MODEL_DISPLAY_NAME;
document.getElementById('survey-date').textContent = SURVEY_DATE;

// Scene setup
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1b2a);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.01, 1000);
camera.position.set(0, 15, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x88aacc, 0.3);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// Orbit Controls (Three.js r128 inline)
class OrbitControls {
  constructor(camera, domElement) {
    this.camera = camera;
    this.domElement = domElement;
    this.target = new THREE.Vector3();
    this.minDistance = 0.1;
    this.maxDistance = 500;
    this.autoRotate = false;
    this.autoRotateSpeed = 0.5;
    this._spherical = new THREE.Spherical();
    this._sphericalDelta = new THREE.Spherical();
    this._scale = 1;
    this._panOffset = new THREE.Vector3();
    this._rotateStart = new THREE.Vector2();
    this._rotateEnd = new THREE.Vector2();
    this._rotateDelta = new THREE.Vector2();
    this._panStart = new THREE.Vector2();
    this._panEnd = new THREE.Vector2();
    this._panDelta = new THREE.Vector2();
    this._dollyStart = new THREE.Vector2();
    this._dollyEnd = new THREE.Vector2();
    this._dollyDelta = new THREE.Vector2();
    this._state = 0; // NONE
    this._EPS = 0.000001;

    this.domElement.addEventListener('mousedown', this._onMouseDown.bind(this));
    this.domElement.addEventListener('mousemove', this._onMouseMove.bind(this));
    this.domElement.addEventListener('mouseup', this._onMouseUp.bind(this));
    this.domElement.addEventListener('wheel', this._onWheel.bind(this), { passive: false });
    this.domElement.addEventListener('contextmenu', e => e.preventDefault());
    this.domElement.addEventListener('touchstart', this._onTouchStart.bind(this), { passive: false });
    this.domElement.addEventListener('touchmove', this._onTouchMove.bind(this), { passive: false });
    this.domElement.addEventListener('touchend', this._onTouchEnd.bind(this));

    this.update();
  }

  _onMouseDown(e) {
    e.preventDefault();
    if (e.button === 0) { this._state = 1; this._rotateStart.set(e.clientX, e.clientY); }
    else if (e.button === 2) { this._state = 2; this._panStart.set(e.clientX, e.clientY); }
    else if (e.button === 1) { this._state = 3; this._dollyStart.set(e.clientX, e.clientY); }
  }
  _onMouseMove(e) {
    if (this._state === 1) {
      this._rotateEnd.set(e.clientX, e.clientY);
      this._rotateDelta.subVectors(this._rotateEnd, this._rotateStart).multiplyScalar(0.005);
      this._sphericalDelta.theta -= this._rotateDelta.x;
      this._sphericalDelta.phi -= this._rotateDelta.y;
      this._rotateStart.copy(this._rotateEnd);
    } else if (this._state === 2) {
      this._panEnd.set(e.clientX, e.clientY);
      this._panDelta.subVectors(this._panEnd, this._panStart).multiplyScalar(0.01);
      this._pan(this._panDelta.x, this._panDelta.y);
      this._panStart.copy(this._panEnd);
    } else if (this._state === 3) {
      this._dollyEnd.set(e.clientX, e.clientY);
      this._dollyDelta.subVectors(this._dollyEnd, this._dollyStart);
      if (this._dollyDelta.y > 0) this._scale /= 0.95;
      else if (this._dollyDelta.y < 0) this._scale *= 0.95;
      this._dollyStart.copy(this._dollyEnd);
    }
  }
  _onMouseUp() { this._state = 0; }
  _onWheel(e) {
    e.preventDefault();
    if (e.deltaY < 0) this._scale *= 0.92;
    else this._scale /= 0.92;
  }
  _onTouchStart(e) {
    e.preventDefault();
    if (e.touches.length === 1) { this._state = 1; this._rotateStart.set(e.touches[0].pageX, e.touches[0].pageY); }
    else if (e.touches.length === 2) {
      this._state = 3;
      const dx = e.touches[0].pageX - e.touches[1].pageX;
      const dy = e.touches[0].pageY - e.touches[1].pageY;
      this._dollyStart.set(0, Math.sqrt(dx*dx + dy*dy));
    }
  }
  _onTouchMove(e) {
    e.preventDefault();
    if (e.touches.length === 1 && this._state === 1) {
      this._rotateEnd.set(e.touches[0].pageX, e.touches[0].pageY);
      this._rotateDelta.subVectors(this._rotateEnd, this._rotateStart).multiplyScalar(0.005);
      this._sphericalDelta.theta -= this._rotateDelta.x;
      this._sphericalDelta.phi -= this._rotateDelta.y;
      this._rotateStart.copy(this._rotateEnd);
    } else if (e.touches.length === 2 && this._state === 3) {
      const dx = e.touches[0].pageX - e.touches[1].pageX;
      const dy = e.touches[0].pageY - e.touches[1].pageY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      this._dollyEnd.set(0, dist);
      if (this._dollyEnd.y > this._dollyStart.y) this._scale *= 0.97;
      else this._scale /= 0.97;
      this._dollyStart.copy(this._dollyEnd);
    }
  }
  _onTouchEnd() { this._state = 0; }
  _pan(deltaX, deltaY) {
    const offset = new THREE.Vector3();
    offset.copy(this.camera.position).sub(this.target);
    let targetDistance = offset.length();
    targetDistance *= Math.tan((this.camera.fov / 2) * Math.PI / 180);
    const v = new THREE.Vector3();
    v.setFromMatrixColumn(this.camera.matrix, 0);
    v.multiplyScalar(-2 * deltaX * targetDistance / container.clientHeight);
    this._panOffset.add(v);
    v.setFromMatrixColumn(this.camera.matrix, 1);
    v.multiplyScalar(2 * deltaY * targetDistance / container.clientHeight);
    this._panOffset.add(v);
  }
  update() {
    const offset = new THREE.Vector3();
    const quat = new THREE.Quaternion().setFromUnitVectors(this.camera.up, new THREE.Vector3(0,1,0));
    const quatInverse = quat.clone().invert();
    offset.copy(this.camera.position).sub(this.target);
    offset.applyQuaternion(quat);
    this._spherical.setFromVector3(offset);
    if (this.autoRotate) {
      this._sphericalDelta.theta -= (2 * Math.PI / 60 / 60) * this.autoRotateSpeed;
    }
    this._spherical.theta += this._sphericalDelta.theta;
    this._spherical.phi += this._sphericalDelta.phi;
    this._spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, this._spherical.phi));
    this._spherical.radius *= this._scale;
    this._spherical.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this._spherical.radius));
    this.target.add(this._panOffset);
    offset.setFromSpherical(this._spherical);
    offset.applyQuaternion(quatInverse);
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);
    this._sphericalDelta.set(0, 0, 0);
    this._scale = 1;
    this._panOffset.set(0, 0, 0);
  }
}

const controls = new OrbitControls(camera, renderer.domElement);

// Draco対応GLBLoaderを動的読み込み
let model = null;
let initialCameraPos = null;
let initialTarget = null;
let autoRotating = false;

function loadGLB(url) {
  const loadingEl = document.getElementById('loading');
  const loadingBar = document.getElementById('loading-bar');
  const loadingText = document.getElementById('loading-text');

  // Draco decoder script を動的追加
  const script1 = document.createElement('script');
  script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';

  fetch(url)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const total = parseInt(res.headers.get('content-length') || '0');
      let loaded = 0;
      const reader = res.body.getReader();
      const chunks = [];
      function read() {
        return reader.read().then(({ done, value }) => {
          if (done) return;
          chunks.push(value);
          loaded += value.length;
          if (total > 0) {
            const pct = Math.round(loaded / total * 80);
            loadingBar.style.width = pct + '%';
            loadingText.textContent = `読み込み中... ${Math.round(loaded/1024/1024)}MB`;
          }
          return read();
        });
      }
      return read().then(() => {
        const blob = new Blob(chunks);
        return blob.arrayBuffer();
      });
    })
    .then(buffer => {
      loadingBar.style.width = '85%';
      loadingText.textContent = 'Dracoデコード中...';
      return parseDracoGLB(buffer);
    })
    .then(obj => {
      loadingBar.style.width = '100%';
      loadingText.textContent = '完了！';
      scene.add(obj);
      model = obj;

      // センタリング＆スケール調整
      const box = new THREE.Box3().setFromObject(obj);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 20 / maxDim;
      obj.scale.setScalar(scale);
      obj.position.sub(center.multiplyScalar(scale));

      const box2 = new THREE.Box3().setFromObject(obj);
      const center2 = box2.getCenter(new THREE.Vector3());
      const size2 = box2.getSize(new THREE.Vector3());
      camera.position.set(center2.x, center2.y + size2.y * 0.5, size2.z * 2.2);
      controls.target.copy(center2);
      controls.update();

      initialCameraPos = camera.position.clone();
      initialTarget = controls.target.clone();

      setTimeout(() => loadingEl.classList.add('hidden'), 400);
    })
    .catch(err => {
      console.error(err);
      document.getElementById('loading').style.display = 'none';
      const errEl = document.getElementById('error');
      errEl.classList.add('show');
      document.getElementById('error-msg').textContent =
        `ファイル "${MODEL_FILE}" の読み込みに失敗しました。\nGLBファイルが同じフォルダに存在するか確認してください。\n\nエラー: ${err.message}`;
    });
}

// Dracoなしのシンプルなパーサー（Three.js GLTFLoader CDN版）
function parseDracoGLB(buffer) {
  return new Promise((resolve, reject) => {
    // GLTFLoaderをCDNから動的ロード
    const loaderScript = document.createElement('script');
    loaderScript.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    loaderScript.onload = () => {
      const dracoScript = document.createElement('script');
      dracoScript.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js';
      dracoScript.onload = () => {
        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);
        loader.parse(buffer, '', gltf => {
          resolve(gltf.scene);
        }, reject);
      };
      dracoScript.onerror = () => reject(new Error('DRACOLoaderの読み込みに失敗しました'));
      document.head.appendChild(dracoScript);
    };
    loaderScript.onerror = () => reject(new Error('GLTFLoaderの読み込みに失敗しました'));
    document.head.appendChild(loaderScript);
  });
}

// ボタン操作
document.getElementById('btn-reset').addEventListener('click', () => {
  if (initialCameraPos) {
    camera.position.copy(initialCameraPos);
    controls.target.copy(initialTarget);
    controls.update();
  }
});

document.getElementById('btn-top').addEventListener('click', () => {
  if (!model) return;
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  camera.position.set(center.x, center.y + size.y * 2.5, center.z);
  controls.target.copy(center);
  controls.update();
});

document.getElementById('btn-front').addEventListener('click', () => {
  if (!model) return;
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  camera.position.set(center.x, center.y, center.z + size.z * 2.2);
  controls.target.copy(center);
  controls.update();
});

document.getElementById('btn-auto').addEventListener('click', () => {
  autoRotating = !autoRotating;
  controls.autoRotate = autoRotating;
  document.getElementById('btn-auto').textContent = autoRotating ? '⏸ 停止' : '▶ 自動回転';
});

// リサイズ対応
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// アニメーションループ
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// モデル読み込み開始
loadGLB(MODEL_FILE);
</script>
</body>
</html>
